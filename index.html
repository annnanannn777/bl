<style>
:root {
  --bg: #F7F7F5;
  --surface: #FFFFFF;
  --border: #E8E6E1;
  --border-hover: #C8C4BC;
  --text: #1A1A18;
  --text-sub: #6B6860;
  --text-muted: #9B9890;
  --accent: #C0466A;
  --accent-light: #F9EEF2;
  --accent-hover: #A33459;
  --green: #1E6E42;
  --green-light: #E8F5EE;
  --amber: #8B5A00;
  --amber-light: #FEF3E2;
  --blue: #2155A3;
  --blue-light: #EBF1FB;
  --tag-bg: #F0EEE9;
  --tag-text: #4A4840;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* ヘッダー */
header {
  background: var(--text);
  color: white;
  padding: 2rem 2rem 1.75rem;
  text-align: center;
}
.site-title {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(1.25rem, 4vw, 1.9rem);
  font-weight: 600;
  letter-spacing: 0.12em;
  margin-bottom: 0.3rem;
}
.site-subtitle {
  font-size: 0.7rem;
  opacity: 0.4;
  letter-spacing: 0.2em;
  font-weight: 300;
}

.container { max-width: 1160px; margin: 0 auto; padding: 1.75rem 1.5rem; }

/* ピックアップ */
.pickup-section { margin-bottom: 2rem; }
.pickup-heading {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.pickup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
.pickup-card {
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.pickup-card:hover { opacity: 0.9; transform: translateY(-1px); }
.pickup-card.onair { background: var(--green); color: white; }
.pickup-card.upcoming { background: var(--amber); color: white; }
.pickup-status { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.18em; opacity: 0.8; }
.pickup-title { font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 600; line-height: 1.4; }
.pickup-cast { font-size: 0.75rem; opacity: 0.85; }
.pickup-meta { font-size: 0.7rem; opacity: 0.65; }
.pickup-links { display: flex; gap: 0.4rem; margin-top: 0.2rem; flex-wrap: wrap; }
.pickup-link {
  font-size: 0.67rem; padding: 0.18rem 0.6rem; border-radius: 100px;
  background: rgba(255,255,255,0.18); color: white;
  text-decoration: none; border: 1px solid rgba(255,255,255,0.25);
  transition: background 0.15s; white-space: nowrap;
}
.pickup-link:hover { background: rgba(255,255,255,0.3); }

/* フィルター */
.filters {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.1rem 1.25rem;
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.filters-row { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 120px; }
.filter-group.wide { flex: 2; min-width: 190px; }
.filter-group label { font-size: 0.62rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
.filter-group select,
.filter-group input[type="text"] {
  padding: 0.42rem 0.65rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  background: var(--bg);
  color: var(--text);
  appearance: none; -webkit-appearance: none;
  width: 100%; transition: border-color 0.15s, background 0.15s;
}
.filter-group select:focus,
.filter-group input:focus { outline: none; border-color: var(--accent); background: white; }
.filters-actions { display: flex; gap: 0.4rem; align-items: center; margin-top: 0.6rem; flex-wrap: wrap; }
.active-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; flex: 1; }
.active-tag {
  font-size: 0.68rem; background: var(--accent-light); color: var(--accent);
  padding: 0.18rem 0.55rem; border-radius: 100px; cursor: pointer; transition: background 0.1s;
}
.active-tag:hover { background: var(--accent); color: white; }
.reset-btn {
  padding: 0.35rem 0.9rem; background: none; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.75rem; color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }

.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; flex-wrap: wrap; gap: 0.5rem; }
.results-count { font-size: 0.8rem; color: var(--text-muted); }
.results-count span { font-weight: 600; color: var(--text); }
.sort-select {
  padding: 0.35rem 0.65rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.78rem;
  background: var(--surface); color: var(--text); cursor: pointer; appearance: none; -webkit-appearance: none;
}

/* グリッド・カード */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 1rem; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 1.1rem 1.2rem;
  transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  box-shadow: var(--shadow);
}
.card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
.card-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.97rem;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text);
  letter-spacing: 0.01em;
}
.card-year {
  font-size: 0.67rem; color: var(--text-sub);
  background: var(--tag-bg); padding: 0.18rem 0.5rem;
  border-radius: 4px; white-space: nowrap; flex-shrink: 0; font-weight: 500;
}

.card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.tag { font-size: 0.65rem; padding: 0.16rem 0.5rem; border-radius: 4px; font-weight: 500; letter-spacing: 0.02em; }
.tag-format { background: var(--accent-light); color: var(--accent); }
.tag-channel { background: var(--blue-light); color: var(--blue); }
.tag-custom { background: var(--tag-bg); color: var(--tag-text); }
.tag-onair { background: var(--green-light); color: var(--green); font-weight: 700; }
.tag-upcoming { background: var(--amber-light); color: var(--amber); font-weight: 700; }

.card-cast { font-size: 0.78rem; color: var(--text); font-weight: 500; display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; }
.cast-label { color: var(--text-muted); font-weight: 400; font-size: 0.72rem; margin-right: 0.1rem; flex-shrink: 0; }
.cast-chips { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.25rem; }
.cast-sep { color: var(--text-muted); font-size: 0.7rem; padding: 0 0.1rem; }
.cast-chip {
  font-size: 0.76rem; font-weight: 500; color: var(--accent);
  cursor: pointer; padding: 0.1rem 0;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.cast-chip:hover { border-bottom-color: var(--accent); color: var(--accent-hover); }
.tag.clickable { cursor: pointer; transition: background 0.15s, color 0.15s; }
.tag.clickable:hover { background: var(--accent); color: white; }
.card-meta-row { font-size: 0.75rem; color: var(--text); display: flex; align-items: center; flex-wrap: wrap; gap: 0.25rem; }
.meta-label { color: var(--text-muted); font-size: 0.7rem; margin-right: 0.1rem; flex-shrink: 0; }
.meta-chips { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.2rem; }
.info-chip {
  font-size: 0.74rem; color: var(--text-sub); cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.info-chip:hover { border-bottom-color: var(--text-sub); color: var(--text); }
.info-sep { color: var(--text-muted); font-size: 0.68rem; }
.card-desc { font-size: 0.76rem; color: var(--text-sub); line-height: 1.75; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border); padding-top: 0.6rem;
  gap: 0.5rem; flex-wrap: wrap; margin-top: auto;
}
.card-links { display: flex; gap: 0.35rem; flex-wrap: wrap; }
.card-link {
  font-size: 0.67rem; padding: 0.2rem 0.6rem; border-radius: 4px;
  text-decoration: none; transition: all 0.15s; white-space: nowrap; cursor: pointer; font-weight: 500;
}
.card-link-official { background: var(--accent-light); color: var(--accent); border: none; }
.card-link-official:hover { background: var(--accent); color: white; }
.card-link-music { background: #F0EDFB; color: #4A2D9E; border: none; }
.card-link-music:hover { background: #4A2D9E; color: white; }
.card-streaming { font-size: 0.68rem; color: var(--text-muted); }

/* モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius); padding: 1.75rem 2rem;
  max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem; background: var(--bg); border: none;
  font-size: 1rem; cursor: pointer; color: var(--text-muted); line-height: 1;
  padding: 0.3rem 0.5rem; border-radius: var(--radius-sm); transition: background 0.15s;
}
.modal-close:hover { background: var(--border); }
.modal-title {
  font-family: 'Noto Serif JP', serif; font-size: 1.25rem; font-weight: 600;
  margin-bottom: 0.65rem; padding-right: 2.5rem; line-height: 1.4; color: var(--text);
}
.modal-status { margin-bottom: 0.75rem; }
.modal-links { display: flex; gap: 0.5rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
.modal-link {
  font-size: 0.76rem; padding: 0.32rem 0.9rem; border-radius: var(--radius-sm);
  text-decoration: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem; font-weight: 500;
}
.modal-link-official { background: var(--accent-light); color: var(--accent); }
.modal-link-official:hover { background: var(--accent); color: white; }
.modal-link-music { background: #F0EDFB; color: #4A2D9E; }
.modal-link-music:hover { background: #4A2D9E; color: white; }
.modal-grid {
  display: grid; grid-template-columns: auto 1fr; gap: 0.45rem 1rem;
  font-size: 0.8rem; margin-bottom: 1rem;
  background: var(--bg); border-radius: var(--radius-sm); padding: 0.9rem 1rem;
}
.modal-label { color: var(--text-muted); white-space: nowrap; font-size: 0.75rem; padding-top: 0.05rem; }
.modal-value { color: var(--text); }
.modal-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.85; border-top: 1px solid var(--border); padding-top: 1rem; }

.no-results { text-align: center; padding: 4rem 2rem; color: var(--text-muted); grid-column: 1/-1; }
.no-results .emoji { font-size: 2rem; margin-bottom: 0.75rem; }
.no-results p { font-size: 0.85rem; line-height: 1.8; }

footer { text-align: center; padding: 2rem; font-size: 0.72rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 3rem; }

@media (max-width: 600px) {
  .filter-group { min-width: calc(50% - 0.3rem); }
  .filter-group.wide { min-width: 100%; }
  .grid, .pickup-grid { grid-template-columns: 1fr; }
}
</style>

  </div>

  <div class="grid" id="movieGrid"></div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-links" id="modalLinks"></div>
    <div class="modal-grid" id="modalGrid"></div>
    <div class="modal-desc" id="modalDesc"></div>

</div>

// =============================================
// ★★★ ここまでが作品データ ★★★
// =============================================

const STATUS_ORDER = { '放送中': 0, '放送予定': 1, '放送終了': 2, '': 3 };

// ステータス自動判定
// 「放送中」と手動設定されていればそのまま優先
// それ以外は公開年月日が今日以降なら「放送予定」、過去なら「放送終了」
function getStatus(m) {
  if (m.status === '放送中') return '放送中';
  if (!m.release) return m.status || '';
  const today = new Date(); today.setHours(0,0,0,0);
  const rel = new Date(m.release.replace(/\//g, '-'));
  if (isNaN(rel)) return m.status || '';
  return rel > today ? '放送予定' : '放送終了';
}

function getYear(m) { const x = (m.release||'').match(/(\d{4})/); return x ? x[1] : ''; }
function getTags(m) { return (m.tags||'').split(/[,、／\s]+/).map(s=>s.trim()).filter(Boolean); }
function unique(arr) { return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja')); }

function fill(id, values, labelFn) {
  const sel = document.getElementById(id);
  values.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=labelFn(v); sel.appendChild(o); });
}

function populateFilters() {
  fill('filterFormat',  unique(DATA.map(m=>m.format)),  v=>v);
  fill('filterChannel', unique(DATA.map(m=>m.channel)), v=>v);
  fill('filterYear',    unique(DATA.map(m=>getYear(m))).filter(Boolean).reverse(), v=>v+'年');
  fill('filterTag',     unique(DATA.flatMap(m=>getTags(m))), v=>v);
}

function renderPickup() {
  const pickups = DATA.filter(m => getStatus(m)==='放送中' || getStatus(m)==='放送予定');
  const section = document.getElementById('pickupSection');
  if (!pickups.length) { section.style.display='none'; return; }
  section.style.display = '';
  document.getElementById('pickupGrid').innerHTML = pickups.map(m => {
    const cast = [m.castA, m.castB].filter(Boolean).join(' × ');
    const links = [];
    if (m.officialUrl) links.push(`<a href="${m.officialUrl}" target="_blank" class="pickup-link" onclick="event.stopPropagation()">🔗 公式サイト</a>`);
    if (m.musicUrl)    links.push(`<a href="${m.musicUrl}"   target="_blank" class="pickup-link" onclick="event.stopPropagation()">🎵 主題歌</a>`);
    return `<div class="pickup-card ${getStatus(m)==='放送中'?'onair':'upcoming'}" onclick="openModal(${DATA.indexOf(m)})">
      <div class="pickup-status">${getStatus(m)==='放送中'?'▶ ON AIR':'◎ COMING SOON'}</div>
      <div class="pickup-title">${m.title}</div>
      ${cast?`<div class="pickup-cast">${cast}</div>`:''}
      <div class="pickup-meta">${[m.channel, m.airtime, m.episodes].filter(Boolean).join(' ／ ')}</div>
      ${links.length?`<div class="pickup-links">${links.join('')}</div>`:''}
    </div>`;
  }).join('');
}

function getFiltered() {
  const search  = document.getElementById('searchInput').value.toLowerCase();
  const format  = document.getElementById('filterFormat').value;
  const channel = document.getElementById('filterChannel').value;
  const year    = document.getElementById('filterYear').value;
  const tag     = document.getElementById('filterTag').value;
  const status  = document.getElementById('filterStatus').value;
  const sort    = document.getElementById('sortSelect').value;

  let list = DATA.filter(m => {
    const t = [m.title,m.castA,m.castB,m.mainCast,m.otherCast,m.director,m.author,m.original,m.tags,m.highlight].join(' ').toLowerCase();
    return (!search||t.includes(search))
        && (!format||m.format===format)
        && (!channel||m.channel===channel)
        && (!year||getYear(m)===year)
        && (!tag||getTags(m).includes(tag))
        && (!status||getStatus(m)===status);
  });

  list.sort((a,b)=>{
    if (sort==='status') {
      const sd = (STATUS_ORDER[getStatus(a)]??3) - (STATUS_ORDER[getStatus(b)]??3);
      if (sd !== 0) return sd;
      return (getYear(b)||'0').localeCompare(getYear(a)||'0');
    }
    if (sort==='year-desc') return (getYear(b)||'0').localeCompare(getYear(a)||'0');
    if (sort==='year-asc')  return (getYear(a)||'0').localeCompare(getYear(b)||'0');
    if (sort==='title')     return (a.title||'').localeCompare(b.title||'','ja');
    if (sort==='id')        return Number(a.id)-Number(b.id);
    return 0;
  });
  return list;
}

function renderActiveTags() {
  const defs = [
    {el:'searchInput',   type:'input',  label:v=>'🔍 '+v},
    {el:'filterFormat',  type:'select', label:v=>'形式: '+v},
    {el:'filterChannel', type:'select', label:v=>'局: '+v},
    {el:'filterYear',    type:'select', label:v=>v+'年'},
    {el:'filterTag',     type:'select', label:v=>'#'+v},
    {el:'filterStatus',  type:'select', label:v=>v},
  ];
  const active = defs.map(d=>{ const v=document.getElementById(d.el).value; return v?{label:d.label(v),el:d.el}:null; }).filter(Boolean);
  document.getElementById('activeTags').innerHTML = active.map(a=>
    `<span class="active-tag" onclick="clearOne('${a.el}')">✕ ${a.label}</span>`
  ).join('');
}

function clearOne(elId) { document.getElementById(elId).value=''; render(); }

// キーワード検索にセットしてページトップへスクロール
function searchBy(keyword, event) {
  if (event) event.stopPropagation();
  document.getElementById('searchInput').value = keyword;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// クリッカブルな俳優名チップを生成
function castChip(name) {
  if (!name) return '';
  return `<span class="cast-chip" onclick="searchBy('${name.replace(/'/g,"\\'")}', event)">${name}</span>`;
}

// クリッカブルなタグを生成
function tagChip(t) {
  return `<span class="tag tag-custom clickable" onclick="searchBy('${t.replace(/'/g,"\\'")}', event)">#${t}</span>`;
}

// クリッカブルな汎用チップを生成（テキストリンク風）
function infoChip(name) {
  if (!name) return '';
  return `<span class="info-chip" onclick="searchBy('${name.replace(/'/g,"\\'")}', event)">${name}</span>`;
}

function render() {
  renderActiveTags();
  const list = getFiltered();
  document.getElementById('countDisplay').textContent = list.length;
  const grid = document.getElementById('movieGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="no-results"><div class="emoji">🎬</div><p>条件に合う作品が見つかりませんでした。</p></div>`;
    return;
  }
  grid.innerHTML = list.map(m => {
    const year = getYear(m);
    const tags = getTags(m).slice(0,3);
    const idx  = DATA.indexOf(m);
    const statusTag = getStatus(m)==='放送中'  ? `<span class="tag tag-onair">▶ 放送中</span>`
                    : getStatus(m)==='放送予定' ? `<span class="tag tag-upcoming">◎ 放送予定</span>` : '';
    const links = [];
    if (m.officialUrl) links.push(`<a href="${m.officialUrl}" target="_blank" class="card-link card-link-official" onclick="event.stopPropagation()">🔗 公式</a>`);
    if (m.musicUrl)    links.push(`<a href="${m.musicUrl}"   target="_blank" class="card-link card-link-music"    onclick="event.stopPropagation()">🎵 主題歌</a>`);

    // 主演2名をクリッカブルチップで表示
    const castChips = [m.castA, m.castB].filter(Boolean).map(castChip).join('<span class="cast-sep">×</span>');

    // 監督（複数いる場合はカンマ区切り）
    const directors = m.director ? m.director.split(/[,、]+/).map(s=>s.trim()).filter(Boolean) : [];
    const directorChips = directors.map(infoChip).join('<span class="info-sep">・</span>');

    // 配信サイト（最初の1つだけ表示＋クリッカブル）
    const streamings = m.streaming ? m.streaming.split(',').map(s=>s.trim()).filter(Boolean) : [];
    const streamingChip = streamings.length
      ? `${infoChip(streamings[0])}${streamings.length>1?`<span class="info-sep">ほか</span>`:''}`
      : '';

    return `<div class="card" onclick="openModal(${idx})">
      <div class="card-top">
        <div class="card-title">${m.title}</div>
        ${year?`<div class="card-year">${year}</div>`:''}
      </div>
      <div class="card-tags">
        ${statusTag}
        ${m.format  ?`<span class="tag tag-format">${m.format}</span>`:''}
        ${m.channel ?`<span class="tag tag-channel clickable" onclick="searchBy('${m.channel.replace(/'/g,"\\'")}',event)">${m.channel}</span>`:''}
        ${tags.map(tagChip).join('')}
      </div>
      ${castChips?`<div class="card-cast"><span class="cast-label">主演</span><span class="cast-chips">${castChips}</span></div>`:''}
      ${directorChips?`<div class="card-meta-row"><span class="meta-label">監督</span><span class="meta-chips">${directorChips}</span></div>`:''}
      ${m.highlight?`<div class="card-desc">${m.highlight}</div>`:''}
      <div class="card-footer">
        <div class="card-links">${links.join('')}</div>
        ${streamingChip?`<div class="card-streaming">▶ ${streamingChip}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const m = DATA[idx];
  document.getElementById('modalTitle').textContent = m.title;

  const statusEl = document.getElementById('modalStatus');
  statusEl.innerHTML = getStatus(m)==='放送中'  ? `<span class="tag tag-onair">▶ 放送中</span>`
                     : getStatus(m)==='放送予定' ? `<span class="tag tag-upcoming">◎ 放送予定</span>` : '';

  const linksEl = document.getElementById('modalLinks');
  const links = [];
  if (m.officialUrl) links.push(`<a href="${m.officialUrl}" target="_blank" class="modal-link modal-link-official">🔗 公式サイトを開く</a>`);
  if (m.musicUrl)    links.push(`<a href="${m.musicUrl}"   target="_blank" class="modal-link modal-link-music">🎵 主題歌を聴く</a>`);
  linksEl.innerHTML = links.join('');

  const fields = [
    ['形式',m.format],['放送枠',m.slot],['放送局',m.channel],
    ['放送日時',m.airtime],['話数構成',m.episodes],['公開年月日',m.release],
    ['主演俳優A',m.castA],['主演俳優B',m.castB],['主要キャスト',m.mainCast],
    ['その他キャスト',m.otherCast],['監督',m.director],['脚本',m.script],
    ['音楽',m.music],['原作',m.original],['原作者',m.author],
    ['配信サイト',m.streaming],['OP主題歌',m.op],['ED主題歌',m.ed],['タグ',m.tags],
  ].filter(([,v])=>v);

  document.getElementById('modalGrid').innerHTML = fields.map(([l,v])=>
    `<div class="modal-label">${l}</div><div class="modal-value">${v}</div>`
  ).join('');
  const desc = document.getElementById('modalDesc');
  desc.textContent = m.highlight||'';
  desc.style.display = m.highlight ? '' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

function resetFilters() {
  ['searchInput','filterFormat','filterChannel','filterYear','filterTag','filterStatus'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('sortSelect').value='status';
  render();
}

document.getElementById('searchInput').addEventListener('input', render);
['filterFormat','filterChannel','filterYear','filterTag','filterStatus','sortSelect'].forEach(id=>{
  document.getElementById(id).addEventListener('change', render);
});

populateFilters();
renderPickup();
render();
</script>
